<div class="clientes-container">
   <div class="row">
      <div class="col">
        <div class="header">
          <h4>CLIENTES</h4>
        </div>
      </div>      
      <div class="col">
       <input #filtroInput (keyup)="aplicarFiltro(filtroInput.value)" placeholder="Filtrar por nombre">
      </div>          
      <div class="col">
        <button class="btn btn-warning btn-sm" (click)="informeSaldos()">
           Informe de Saldos
        </button>
      </div>
      <div class="col">
        <button class="btn btn-primary btn-sm" (click)="informeCobros()">
           Informe de Cobranza
        </button>
      </div>
      <div class="col-3">        
      </div>
      <div class="col">
        <button class="btn btn-primary btn-sm add-button" (click)="agCliente()">
          <i class="bi bi-plus-circle me-1"></i>Agregar
        </button>
      </div>
  </div>  
  <div class="table-container" style="overflow-x: auto">
    <table
      mat-table
      class="mat-elevation-z8"
      [dataSource]="this.dataSource"
      style="width: 100%"
    >
      <!-- Columna ID Cliente -->
      <ng-container matColumnDef="idCliente">
        <th mat-header-cell *matHeaderCellDef>Nro</th>
        <td mat-cell *matCellDef="let renCli">{{ renCli.idCliente }}</td>
      </ng-container>

      <!-- Columna Nombre -->
      <ng-container matColumnDef="nombre">
        <th mat-header-cell *matHeaderCellDef>Nombre</th>
        <td mat-cell *matCellDef="let renCli">{{ renCli.nombre }}</td>
      </ng-container>

      <!-- Columna Teléfono -->
      <ng-container matColumnDef="telefono">
        <th mat-header-cell *matHeaderCellDef>Teléfono</th>
        <td mat-cell *matCellDef="let renCli">{{ renCli.telefono }}</td>
      </ng-container>

      <!-- Columna Contacto -->
      <ng-container matColumnDef="contacto">
        <th mat-header-cell *matHeaderCellDef>Contacto</th>
        <td mat-cell *matCellDef="let renCli">{{ renCli.contacto }}</td>
      </ng-container>

      <!-- Columna CUIT -->
      <ng-container matColumnDef="cuit">
        <th mat-header-cell *matHeaderCellDef>CUIT</th>
        <td mat-cell *matCellDef="let renCli">{{ renCli.cuit }}</td>
      </ng-container>

      <!-- Columna Notas -->
      <ng-container matColumnDef="notas">
        <th mat-header-cell *matHeaderCellDef>Notas</th>
        <td mat-cell *matCellDef="let renCli">{{ renCli.notas }}</td>
      </ng-container>

      <!-- Columna Modificar -->
      <ng-container matColumnDef="M">
        <th mat-header-cell *matHeaderCellDef>Mod</th>
        <td mat-cell *matCellDef="let renCli">
          <div class="text-center">
            <button
              mat-icon-button
              class="action-btn"
              title="modificar cliente"
              (click)="modificarCliente(renCli.idCliente, renCli.nombre)"
            >
              <i class="bi bi-pencil-fill"></i>
            </button>
          </div>
        </td>
      </ng-container>

      <!-- Columna Borrar -->
      <ng-container matColumnDef="B">
        <th mat-header-cell *matHeaderCellDef>Bor</th>
        <td mat-cell *matCellDef="let renCli">
          <div class="text-center">
            <button
              mat-icon-button
              class="action-btn"
              title="borrar cliente"
              (click)="borrarCliente(renCli.idCliente)"
            >
              <i class="bi bi-trash-fill"></i>
            </button>
          </div>
        </td>
      </ng-container>

      <ng-container matColumnDef="CC">
        <th mat-header-cell *matHeaderCellDef>CC</th>
        <td mat-cell *matCellDef="let renCli">
          <div class="text-center">
            <button
              mat-icon-button
              class="action-btn"
              title="Cuenta Corriente"
              (click)="cuentaCorriente(renCli.idCliente,renCli.nombre)"
            >
            <i class="bi bi-card-list"></i>
            </button>
          </div>
        </td>
      </ng-container>
      <!-- Definición de filas -->
      <tr mat-header-row *matHeaderRowDef="colClientes; sticky: true"></tr>
      <tr mat-row *matRowDef="let row; let index; columns: colClientes"></tr>
    </table>
  </div>
</div>
