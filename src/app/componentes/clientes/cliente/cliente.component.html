<div class="container" cdkDrag cdkDragRootElement=".cdk-overlay-pane">
  <h4 mat-dialog-title>{{operacion}}</h4>  
    <!--form [formGroup]="formCli" class="row ml-3 mt-3 mr-10"-->     
     <form [formGroup]="formCli">        
       <div class="row justify-content-md-left">
        <div class="col-auto">           
           <mat-form-field style="width:70px;"  appearance="fill">
                 <mat-label>Nro</mat-label>
                 <input matInput [readonly]="true" formControlName="nrocli" style="text-align: center;">	
            </mat-form-field>    
        </div>

        <div class="col-auto">
           <mat-form-field style="width:350px;"  appearance="fill">
                <mat-label>Nombre del Cliente</mat-label>
                <input #nombrecliente matInput #inputFocus formControlName="nombre" style="text-align: left;">	
            </mat-form-field>    
        </div>   
        </div>
        <div class="row justify-content-md-left">
            <div class="col-auto">
              <mat-form-field style="width:250px;text-align:left;" appearance="fill">
                <mat-label>Teléfono</mat-label>
                <input matInput formControlName="telefono">	
               </mat-form-field>                   
            </div> 
            <div class="col-auto">
                <mat-form-field style="width:200px;text-align:left;" appearance="fill">
                  <mat-label>CUIT</mat-label>
                  <input matInput formControlName="cuit">	
                 </mat-form-field>                   
              </div> 
            <div class="col-auto">
                <mat-form-field style="width:250px;text-align:left;" appearance="fill">
                  <mat-label>Contacto</mat-label>
                  <input matInput formControlName="contacto">	
                 </mat-form-field>                   
              </div> 
        </div> 
        <div class="row justify-content-md-left">
            <div class="col-auto">
                <mat-form-field style="width:600px;text-align:left;" appearance="fill">
                  <mat-label>Notas</mat-label>
                  <input matInput formControlName="notas">	
                 </mat-form-field>                   
              </div> 
              <div class="col-auto">
                <mat-form-field style="width:150px;text-align:left;" appearance="fill">
                  <mat-label>Campo</mat-label>
                  <input matInput [readonly]="!this.habcampo" formControlName="campo">	
                 </mat-form-field>                   
              </div> 
        </div>
        <div class="botonera">            
              <button class="btn btn-sm btn-outline-primary me-5" 
                       [disabled]="formCli.invalid || datass.accion!='A'" 
                       (click)="AgregarCliente()">Agregar Cliente</button>                                
              <button class="btn btn-sm btn-outline-success me-5" 
                       [disabled]="formCli.invalid || datass.accion!='M'" 
                       (click)="ModificarCliente()">Modificar</button>  
              <button class="btn btn-sm btn-outline-secondary"                
                       (click)="Anular()">Cancelar</button>                       
        </div>  
          
    </form>
</div>
