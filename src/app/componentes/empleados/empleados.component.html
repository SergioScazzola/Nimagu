<div class="empleados-container">
  <div class="row">
    <div class="col">
       <div class="header">
         <h4>EMPLEADOS</h4>
       </div>
    </div>  
    <div class="col">
       <input #filtroInput (keyup)="aplicarFiltro(filtroInput.value)" placeholder="Filtrar por nombre">
      </div>    
    <div class="col">
      <button class="btn btn-primary btn-sm" (click)="informeTrabajos()">
        Informe de Trabajos
      </button>
    </div> 
    <div class="col">
      <button class="btn btn-secondary btn-sm" (click)="informePagos()">
        Informe de Pagos
      </button>
    </div>
    <div class="col">
      <button class="btn btn-warning btn-sm" (click)="informeSaldos()">
        Informe de Saldos
      </button>
    </div>
    <div class="col-3">      
    </div>
    <div class="col">
      <button class="btn btn-primary add-button" (click)="agEmpleado()">
        <i class="bi bi-plus-circle me-1"></i>Agregar
      </button>
    </div>
    
    
  </div>

  <div class="table-container" style="overflow-x: auto">
    <table
      mat-table
      class="mat-elevation-z8"
      [dataSource]="this.dataSource"
      style="width: 100%"
    >
      <!-- Columna ID Empleado -->
      <ng-container matColumnDef="idEmpleado">
        <th mat-header-cell *matHeaderCellDef>Nro</th>
        <td mat-cell *matCellDef="let renEmp">{{ renEmp.idEmpleado }}</td>
      </ng-container>

      <!-- Columna Nombre -->
      <ng-container matColumnDef="nombre">
        <th mat-header-cell *matHeaderCellDef>Nombre</th>
        <td mat-cell *matCellDef="let renEmp">{{ renEmp.nomEmpleado }}</td>
      </ng-container>

      <!-- Columna Domicilio -->
      <ng-container matColumnDef="domicilio">
        <th mat-header-cell *matHeaderCellDef>Domicilio</th>
        <td mat-cell *matCellDef="let renEmp">{{ renEmp.domicilio }}</td>
      </ng-container>

      <!-- Columna DNI -->
      <ng-container matColumnDef="dni">
        <th mat-header-cell *matHeaderCellDef>DNI</th>
        <td mat-cell *matCellDef="let renEmp">{{ renEmp.dni }}</td>
      </ng-container>

      <!-- Columna Teléfono -->
      <ng-container matColumnDef="telefono">
        <th mat-header-cell *matHeaderCellDef>Teléfono</th>
        <td mat-cell *matCellDef="let renEmp">{{ renEmp.telefono }}</td>
      </ng-container>

      <!-- Columna Notas -->
      <ng-container matColumnDef="notas">
        <th mat-header-cell *matHeaderCellDef>Notas</th>
        <td mat-cell *matCellDef="let renEmp">{{ renEmp.notas }}</td>
      </ng-container>

      <!-- Columna Modificar -->
      <ng-container matColumnDef="M">
        <th mat-header-cell *matHeaderCellDef>Mod</th>
        <td mat-cell *matCellDef="let renEmp">
          <div class="text-center">
            <button
              mat-icon-button
              class="action-btn"
              title="modificar empleado"
              (click)="modificarEmpleado(renEmp.idEmpleado, renEmp.nomEmpleado)"
            >
              <i class="bi bi-pencil-fill"></i>
            </button>
          </div>
        </td>
      </ng-container>

      <!-- Columna Borrar -->
      <ng-container matColumnDef="B">
        <th mat-header-cell *matHeaderCellDef>Bor</th>
        <td mat-cell *matCellDef="let renEmp">
          <div class="text-center">
            <button
              mat-icon-button
              class="action-btn"
              title="borrar empleado"
              (click)="borrarEmpleado(renEmp.idEmpleado)"
            >
              <i class="bi bi-trash-fill"></i>
            </button>
          </div>
        </td>
      </ng-container>
      <ng-container matColumnDef="CC">
        <th mat-header-cell *matHeaderCellDef>CC</th>
        <td mat-cell *matCellDef="let renEmp">
          <div class="text-center">
            <button
              mat-icon-button
              class="action-btn"
              title="Cuenta Corriente"
              (click)="cuentaCorriente(renEmp.idEmpleado,renEmp.nomEmpleado)"
            >
            <i class="bi bi-card-list"></i>
            </button>
          </div>
        </td>
      </ng-container>
      <!-- Definición de filas -->
      <tr mat-header-row *matHeaderRowDef="colEmpleados; sticky: true"></tr>
      <tr mat-row *matRowDef="let row; let index; columns: colEmpleados"></tr>
    </table>
  </div>
</div>
